apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-nikk-008
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-nikk-008
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-nikk-008
    spec:
      containers:
      - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/cloudstudents/nikk-course:latest
        imagePullPolicy: Always
        name: app-nikk-008
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-nikk-008
spec:
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-nikk-008
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-nikk-008
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group-name: students-app
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /nikk-cloud
          pathType: Prefix
          backend:
            service:
              name: service-nikk-008
              port:
                number: 3001